<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>js-cloudimage-crop — Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #e0e0e0;
    }

    .demo-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-controls button {
      padding: 8px 16px;
      background: #2a2a2a;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 200ms;
    }

    .demo-controls button:hover {
      background: #3a3a3a;
    }

    .demo-controls input[type="file"] {
      display: none;
    }

    .demo-controls label {
      padding: 8px 16px;
      background: #4fc3f7;
      color: #111;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 200ms;
    }

    .demo-controls label:hover {
      background: #81d4fa;
    }

    #crop-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
    }

    .output-section {
      margin-top: 24px;
      text-align: center;
    }

    .output-section img {
      max-width: 300px;
      max-height: 200px;
      border: 1px solid #444;
      border-radius: 8px;
    }

    .output-section p {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>js-cloudimage-crop Demo</h1>

  <div class="demo-controls">
    <label for="file-input">Upload Image</label>
    <input type="file" id="file-input" accept="image/*" />
    <button id="btn-export">Export Crop</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-get-params">Get Params</button>
  </div>

  <div id="crop-container"></div>

  <div class="output-section" id="output" style="display: none;">
    <img id="output-img" alt="Cropped result" />
    <p id="output-info"></p>
  </div>

  <script type="module" src="./demo.ts"></script>
</body>
</html>
